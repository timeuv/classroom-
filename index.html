<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ฝากงาน</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<style>
  :root {
    --bg: #FAF8F4;
    --ink: #1E1B16;
    --paper: #FFFFFF;
    --line: #E5E0D6;
    --accent: #D4622A;
    --accent-soft: #FBE9DD;
    --green: #3A7D5C;
    --green-soft: #E4F0E9;
    --muted: #8A8275;
    --radius: 14px;
    --shadow: 0 2px 10px rgba(30,27,22,0.06);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  .wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 18px 60px;
    min-height: 100vh;
  }

  /* ---------- Header ---------- */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 22px;
  }

  .brand {
    font-size: 19px;
    font-weight: 800;
    letter-spacing: -0.3px;
  }
  .brand span { color: var(--accent); }

  .who {
    font-size: 13px;
    color: var(--muted);
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 100px;
    padding: 6px 12px;
    cursor: pointer;
  }

  /* ---------- Login screen ---------- */
  .login-card {
    background: var(--paper);
    border-radius: 20px;
    padding: 32px 24px;
    box-shadow: var(--shadow);
    margin-top: 12vh;
    text-align: center;
  }

  .login-card h1 {
    font-size: 22px;
    margin: 0 0 6px;
  }
  .login-card p.sub {
    color: var(--muted);
    font-size: 14px;
    margin: 0 0 26px;
  }

  .number-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
    margin-bottom: 22px;
  }

  .num-btn {
    aspect-ratio: 1;
    border: 1.5px solid var(--line);
    background: var(--bg);
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.15s;
  }
  .num-btn:hover { border-color: var(--accent); }
  .num-btn.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .pw-row {
    display: none;
    margin-bottom: 16px;
  }
  .pw-row.show { display: block; }

  .pw-row label {
    display: block;
    text-align: left;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  input[type="password"], input[type="text"], input[type="number"] {
    width: 100%;
    padding: 13px 14px;
    border: 1.5px solid var(--line);
    border-radius: 10px;
    font-size: 16px;
    background: var(--bg);
    color: var(--ink);
  }
  input:focus { outline: 2px solid var(--accent); border-color: var(--accent); }

  .btn {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.15s;
  }
  .btn-primary {
    background: var(--ink);
    color: white;
  }
  .btn-primary:hover { background: #3a352c; }
  .btn-primary:disabled { background: var(--line); color: var(--muted); cursor: not-allowed; }

  .error-msg {
    color: #C0392B;
    font-size: 13px;
    margin-top: 10px;
    display: none;
  }
  .error-msg.show { display: block; }

  /* ---------- Task list ---------- */
  .section-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 0 0 10px 2px;
  }

  .task-card {
    background: var(--paper);
    border-radius: 14px;
    padding: 16px 16px;
    box-shadow: var(--shadow);
    margin-bottom: 10px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: 0.15s;
  }
  .task-card:hover { border-color: var(--accent); }

  .task-title {
    font-size: 15px;
    font-weight: 700;
    margin: 0 0 4px;
  }
  .task-meta {
    font-size: 12.5px;
    color: var(--muted);
  }

  .empty-state {
    text-align: center;
    padding: 50px 20px;
    color: var(--muted);
  }
  .empty-state .ic { font-size: 38px; margin-bottom: 10px; }

  /* ---------- Task detail modal ---------- */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(30,27,22,0.45);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 50;
  }
  .modal-backdrop.show { display: flex; }

  .modal-sheet {
    background: var(--paper);
    width: 100%;
    max-width: 480px;
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 28px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-title {
    font-size: 19px;
    font-weight: 800;
    margin: 0 0 4px;
  }
  .modal-meta {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .modal-desc {
    font-size: 14.5px;
    line-height: 1.6;
    background: var(--bg);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 20px;
    white-space: pre-wrap;
  }

  .modal-actions { display: flex; flex-direction: column; gap: 10px; }

  .btn-claim {
    background: var(--accent);
    color: white;
  }
  .btn-claim:hover { background: #b8521f; }
  .btn-claim:disabled { background: var(--line); color: var(--muted); cursor: not-allowed; }

  .btn-done {
    background: var(--green-soft);
    color: var(--green);
  }
  .btn-done:hover { background: #d5e9dc; }

  .btn-cancel {
    background: transparent;
    color: var(--muted);
  }

  .status-tag {
    display: inline-block;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 100px;
    margin-bottom: 12px;
  }
  .status-tag.claimed { background: var(--accent-soft); color: var(--accent); }
  .status-tag.mine { background: var(--green-soft); color: var(--green); }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: white;
    padding: 12px 20px;
    border-radius: 100px;
    font-size: 14px;
    font-weight: 600;
    opacity: 0;
    transition: 0.25s;
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="wrap">

  <!-- ============ LOGIN SCREEN ============ -->
  <div id="loginScreen">
    <div class="login-card">
      <h1>เลขที่เท่าไหร่ครับ/คะ?</h1>
      <p class="sub">เลือกเลขที่ตัวเองแล้วใส่รหัส</p>

      <div class="number-grid" id="numberGrid"></div>

      <div class="pw-row" id="pwRow">
        <label id="pwLabel">รหัสของเลขที่ ...</label>
        <input type="password" id="pwInput" placeholder="กรอกรหัส" autocomplete="off">
      </div>

      <button class="btn btn-primary" id="loginBtn" disabled>เข้าสู่ระบบ</button>
      <div class="error-msg" id="loginError">รหัสไม่ถูกต้อง ลองใหม่อีกครั้ง</div>
    </div>
  </div>

  <!-- ============ DASHBOARD ============ -->
  <div id="dashScreen" class="hidden">
    <div class="topbar">
      <div class="brand">ฝาก<span>งาน</span></div>
      <div class="who" id="whoLabel" onclick="logout()">เลขที่ — · ออกจากระบบ</div>
    </div>

    <p class="section-label">งานที่ยังไม่เสร็จ</p>
    <div id="taskList"></div>

    <div class="empty-state hidden" id="emptyState">
      <div class="ic">📭</div>
      <div>ตอนนี้ยังไม่มีงานเข้ามาเลย</div>
    </div>
  </div>

</div>

<!-- ============ TASK DETAIL MODAL ============ -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal-sheet">
    <span class="status-tag hidden" id="statusTag"></span>
    <h2 class="modal-title" id="modalTitle"></h2>
    <div class="modal-meta" id="modalMeta"></div>
    <div class="modal-desc" id="modalDesc"></div>

    <div class="modal-actions">
      <button class="btn btn-claim" id="claimBtn" onclick="claimTask()">ให้ไทม์ทำงานนี้</button>
      <button class="btn btn-done hidden" id="doneBtn" onclick="markDone()">ทำแล้ว</button>
      <button class="btn btn-cancel" onclick="closeModal()">ปิด</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ---------------- Firebase init ----------------
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // ---------------- State ----------------
  let selectedNumber = null;
  let currentUser = null; // { studentId, name }
  let allTasks = [];
  let allOrders = [];
  let activeTaskId = null;

  // ---------------- Login screen: build number grid ----------------
  const numberGrid = document.getElementById('numberGrid');
  for (let i = 1; i <= 30; i++) {
    const b = document.createElement('button');
    b.className = 'num-btn';
    b.textContent = i;
    b.onclick = () => selectNumber(i, b);
    numberGrid.appendChild(b);
  }

  function selectNumber(n, btnEl) {
    selectedNumber = n;
    document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('selected'));
    btnEl.classList.add('selected');
    document.getElementById('pwRow').classList.add('show');
    document.getElementById('pwLabel').textContent = `รหัสของเลขที่ ${n}`;
    document.getElementById('loginBtn').disabled = false;
    document.getElementById('loginError').classList.remove('show');
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }

  document.getElementById('loginBtn').onclick = doLogin;
  document.getElementById('pwInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const pw = document.getElementById('pwInput').value.trim();
    if (!selectedNumber || !pw) return;

    const loginBtn = document.getElementById('loginBtn');
    loginBtn.disabled = true;
    loginBtn.textContent = 'กำลังตรวจสอบ...';

    try {
      const docRef = db.collection('users').doc(String(selectedNumber));
      const docSnap = await docRef.get();

      if (!docSnap.exists || docSnap.data().password !== pw) {
        document.getElementById('loginError').classList.add('show');
        loginBtn.disabled = false;
        loginBtn.textContent = 'เข้าสู่ระบบ';
        return;
      }

      currentUser = { studentId: String(selectedNumber), name: docSnap.data().name || `เลขที่ ${selectedNumber}` };
      sessionStorage.setItem('cr_user', JSON.stringify(currentUser));
      enterDashboard();

    } catch (err) {
      console.error(err);
      document.getElementById('loginError').textContent = 'เชื่อมต่อไม่ได้ ลองใหม่อีกครั้ง';
      document.getElementById('loginError').classList.add('show');
      loginBtn.disabled = false;
      loginBtn.textContent = 'เข้าสู่ระบบ';
    }
  }

  function logout() {
    sessionStorage.removeItem('cr_user');
    currentUser = null;
    location.reload();
  }

  // ---------------- Dashboard ----------------
  function enterDashboard() {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('dashScreen').classList.remove('hidden');
    document.getElementById('whoLabel').textContent = `${currentUser.name} · ออกจากระบบ`;
    listenToTasks();
    listenToOrders();
  }

  // Restore session if already logged in
  (function restoreSession() {
    const saved = sessionStorage.getItem('cr_user');
    if (saved) {
      currentUser = JSON.parse(saved);
      enterDashboard();
    }
  })();

  // ---------------- Real-time listeners ----------------
  function listenToTasks() {
    db.collection('assignments').orderBy('created_at', 'desc')
      .onSnapshot(snap => {
        allTasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderTasks();
      }, err => console.error('tasks listener error', err));
  }

  function listenToOrders() {
    db.collection('orders').onSnapshot(snap => {
      allOrders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderTasks();
    }, err => console.error('orders listener error', err));
  }

  // ---------------- Render task list ----------------
  function renderTasks() {
    const list = document.getElementById('taskList');
    const empty = document.getElementById('emptyState');

    // ซ่อนงานที่ "ทำแล้ว" (status = done หรือ paid) ออกจาก dashboard หลัก
    const visibleTasks = allTasks.filter(t => {
      const order = allOrders.find(o => o.task_id === t.id);
      return !order || (order.status !== 'done' && order.status !== 'paid');
    });

    if (visibleTasks.length === 0) {
      list.innerHTML = '';
      empty.classList.remove('hidden');
      return;
    }
    empty.classList.add('hidden');

    list.innerHTML = '';
    visibleTasks.forEach(t => {
      const order = allOrders.find(o => o.task_id === t.id);
      const card = document.createElement('div');
      card.className = 'task-card';
      card.onclick = () => openTask(t.id);

      let badge = '';
      if (order && order.status === 'pending') {
        badge = order.student_id === currentUser.studentId
          ? ' · กำลังทำโดยเรา'
          : ' · มีคนรับแล้ว';
      }

      card.innerHTML = `
        <div class="task-title">${escapeHtml(t.title)}</div>
        <div class="task-meta">${formatDate(t.due_date)}${badge}</div>
      `;
      list.appendChild(card);
    });
  }

  // ---------------- Task detail modal ----------------
  function openTask(taskId) {
    activeTaskId = taskId;
    const t = allTasks.find(x => x.id === taskId);
    if (!t) return;
    const order = allOrders.find(o => o.task_id === taskId);

    document.getElementById('modalTitle').textContent = t.title;
    document.getElementById('modalMeta').textContent = formatDate(t.due_date);
    document.getElementById('modalDesc').textContent = t.description || 'ไม่มีรายละเอียดเพิ่มเติม';

    const statusTag = document.getElementById('statusTag');
    const claimBtn = document.getElementById('claimBtn');
    const doneBtn = document.getElementById('doneBtn');

    statusTag.classList.add('hidden');
    claimBtn.classList.remove('hidden');
    doneBtn.classList.add('hidden');
    claimBtn.disabled = false;
    claimBtn.textContent = 'ให้ไทม์ทำงานนี้';

    if (order && order.status === 'pending') {
      if (order.student_id === currentUser.studentId) {
        statusTag.textContent = 'เรากำลังทำอยู่';
        statusTag.className = 'status-tag mine';
        claimBtn.classList.add('hidden');
        doneBtn.classList.remove('hidden');
      } else {
        statusTag.textContent = 'มีคนรับงานนี้แล้ว';
        statusTag.className = 'status-tag claimed';
        claimBtn.disabled = true;
        claimBtn.textContent = 'มีคนรับไปแล้ว';
      }
      statusTag.classList.remove('hidden');
    }

    document.getElementById('modalBackdrop').classList.add('show');
  }

  function closeModal() {
    document.getElementById('modalBackdrop').classList.remove('show');
    activeTaskId = null;
  }

  async function claimTask() {
    if (!activeTaskId) return;
    const claimBtn = document.getElementById('claimBtn');
    claimBtn.disabled = true;
    claimBtn.textContent = 'กำลังบันทึก...';

    try {
      // เช็คอีกครั้งว่ายังไม่มีใครรับ (กันชนกัน)
      const existing = await db.collection('orders').where('task_id', '==', activeTaskId).get();
      if (!existing.empty && existing.docs.some(d => d.data().status === 'pending')) {
        showToast('มีคนรับงานนี้ไปก่อนแล้ว');
        closeModal();
        return;
      }

      await db.collection('orders').add({
        task_id: activeTaskId,
        student_id: currentUser.studentId,
        student_name: currentUser.name,
        status: 'pending',
        price: null,
        created_at: firebase.firestore.FieldValue.serverTimestamp()
      });

      showToast('รับงานนี้แล้ว เดี๋ยวรีบทำให้นะ 🙌');
      closeModal();
    } catch (err) {
      console.error(err);
      showToast('บันทึกไม่สำเร็จ ลองใหม่อีกครั้ง');
      claimBtn.disabled = false;
      claimBtn.textContent = 'ให้ไทม์ทำงานนี้';
    }
  }

  async function markDone() {
    if (!activeTaskId) return;
    const order = allOrders.find(o => o.task_id === activeTaskId && o.student_id === currentUser.studentId);
    if (!order) return;

    try {
      await db.collection('orders').doc(order.id).update({ status: 'done' });
      showToast('ทำเครื่องหมายว่าทำแล้ว ✅');
      closeModal();
    } catch (err) {
      console.error(err);
      showToast('อัปเดตไม่สำเร็จ ลองใหม่อีกครั้ง');
    }
  }

  // ---------------- Helpers ----------------
  function formatDate(ts) {
    if (!ts) return 'ไม่ระบุวันส่ง';
    let d;
    if (ts.toDate) d = ts.toDate();
    else d = new Date(ts);
    if (isNaN(d.getTime())) return 'ไม่ระบุวันส่ง';
    return 'ส่ง ' + d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2400);
  }

  document.getElementById('modalBackdrop').addEventListener('click', e => {
    if (e.target.id === 'modalBackdrop') closeModal();
  });
</script>

</body>
</html>
