<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ฝากงาน</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<style>
  :root {
    --bg: #FAF8F4;
    --ink: #1E1B16;
    --paper: #FFFFFF;
    --line: #E5E0D6;
    --accent: #D4622A;
    --accent-soft: #FBE9DD;
    --green: #3A7D5C;
    --green-soft: #E4F0E9;
    --muted: #8A8275;
    --radius: 14px;
    --shadow: 0 2px 10px rgba(30,27,22,0.06);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  .wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 18px 60px;
    min-height: 100vh;
  }

  /* ---------- Header ---------- */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 22px;
  }

  .brand {
    font-size: 19px;
    font-weight: 800;
    letter-spacing: -0.3px;
  }
  .brand span { color: var(--accent); }

  .who {
    font-size: 13px;
    color: var(--muted);
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 100px;
    padding: 6px 12px;
    cursor: pointer;
  }

  /* ---------- Login screen ---------- */
  .login-card {
    background: var(--paper);
    border-radius: 20px;
    padding: 32px 24px;
    box-shadow: var(--shadow);
    margin-top: 12vh;
    text-align: center;
  }

  .login-card h1 {
    font-size: 22px;
    margin: 0 0 6px;
  }
  .login-card p.sub {
    color: var(--muted);
    font-size: 14px;
    margin: 0 0 26px;
  }

  .number-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
    margin-bottom: 22px;
  }

  .num-btn {
    aspect-ratio: 1;
    border: 1.5px solid var(--line);
    background: var(--bg);
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.15s;
  }
  .num-btn:hover { border-color: var(--accent); }
  .num-btn.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .pw-row {
    display: none;
    margin-bottom: 16px;
  }
  .pw-row.show { display: block; }

  .pw-row label {
    display: block;
    text-align: left;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  input[type="password"], input[type="text"], input[type="number"] {
    width: 100%;
    padding: 13px 14px;
    border: 1.5px solid var(--line);
    border-radius: 10px;
    font-size: 16px;
    background: var(--bg);
    color: var(--ink);
  }
  input:focus { outline: 2px solid var(--accent); border-color: var(--accent); }

  .btn {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.15s;
  }
  .btn-primary {
    background: var(--ink);
    color: white;
  }
  .btn-primary:hover { background: #3a352c; }
  .btn-primary:disabled { background: var(--line); color: var(--muted); cursor: not-allowed; }

  .error-msg {
    color: #C0392B;
    font-size: 13px;
    margin-top: 10px;
    display: none;
  }
  .error-msg.show { display: block; }

  /* ---------- Task list ---------- */
  .section-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 0 0 10px 2px;
  }

  .task-card {
    background: var(--paper);
    border-radius: 14px;
    padding: 16px 16px;
    box-shadow: var(--shadow);
    margin-bottom: 10px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: 0.15s;
  }
  .task-card:hover { border-color: var(--accent); }
  
  .task-card.opacity { opacity: 0.6; }

  .task-title {
    font-size: 15px;
    font-weight: 700;
    margin: 0 0 4px;
  }
  .task-meta {
    font-size: 12.5px;
    color: var(--muted);
  }

  .empty-state {
    text-align: center;
    padding: 50px 20px;
    color: var(--muted);
  }
  .empty-state .ic { font-size: 38px; margin-bottom: 10px; }

  /* ---------- Task detail modal ---------- */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(30,27,22,0.45);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 50;
  }
  .modal-backdrop.show { display: flex; }

  .modal-sheet {
    background: var(--paper);
    width: 100%;
    max-width: 480px;
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 28px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-title {
    font-size: 19px;
    font-weight: 800;
    margin: 0 0 4px;
  }
  .modal-meta {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .modal-desc {
    font-size: 14.5px;
    line-height: 1.6;
    background: var(--bg);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 20px;
    white-space: pre-wrap;
  }

  .modal-actions { display: flex; flex-direction: column; gap: 10px; }

  .btn-claim {
    background: var(--accent);
    color: white;
  }
  .btn-claim:hover { background: #b8521f; }
  .btn-claim:disabled { background: var(--line); color: var(--muted); cursor: not-allowed; }

  .btn-self {
    background: var(--paper);
    color: var(--ink);
    border: 1.5px solid var(--line);
  }
  .btn-self:hover { border-color: var(--muted); }

  .btn-done {
    background: var(--green-soft);
    color: var(--green);
  }
  .btn-done:hover { background: #d5e9dc; }

  .btn-cancel {
    background: transparent;
    color: var(--muted);
  }

  .status-tag {
    display: inline-block;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 100px;
    margin-bottom: 12px;
  }
  .status-tag.claimed { background: var(--accent-soft); color: var(--accent); }
  .status-tag.mine { background: var(--green-soft); color: var(--green); }
  .status-tag.alert { background: #FDECEC; color: #C0392B; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: white;
    padding: 12px 20px;
    border-radius: 100px;
    font-size: 14px;
    font-weight: 600;
    opacity: 0;
    transition: 0.25s;
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="wrap">

  <!-- ============ LOGIN SCREEN ============ -->
  <div id="loginScreen">
    <div class="login-card">
      <h1>เลขที่เท่าไหร่ครับ/คะ?</h1>
      <p class="sub">เลือกเลขที่ตัวเองแล้วใส่รหัส</p>

      <div class="number-grid" id="numberGrid"></div>

      <div class="pw-row" id="pwRow">
        <label id="pwLabel">รหัสของเลขที่ ...</label>
        <input type="password" id="pwInput" placeholder="กรอกรหัส" autocomplete="off">
      </div>

      <button class="btn btn-primary" id="loginBtn" disabled>เข้าสู่ระบบ</button>
      <div class="error-msg" id="loginError">รหัสไม่ถูกต้อง ลองใหม่อีกครั้ง</div>
    </div>
  </div>

  <!-- ============ DASHBOARD ============ -->
  <div id="dashScreen" class="hidden">
    <div class="topbar">
      <div class="brand">ฝาก<span>งาน</span></div>
      <div class="who" id="whoLabel" onclick="logout()">เลขที่ — · ออกจากระบบ</div>
    </div>

    <!-- หมวดงานที่ต้องทำ -->
    <div id="pendingSection">
      <p class="section-label">งานที่ต้องทำ</p>
      <div id="taskList"></div>
    </div>

    <!-- หมวดงานที่เสร็จแล้ว (จะโชว์เมื่อมีงาน) -->
    <div id="completedSection" class="hidden" style="margin-top: 24px;">
      <p class="section-label">งานที่เสร็จเรียบร้อยแล้ว</p>
      <div id="completedList"></div>
    </div>

    <div class="empty-state hidden" id="emptyState">
      <div class="ic">📭</div>
      <div>ตอนนี้ยังไม่มีงานเลย สบายใจได้!</div>
    </div>
  </div>

</div>

<!-- ============ TASK DETAIL MODAL ============ -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal-sheet">
    <span class="status-tag hidden" id="statusTag"></span>
    <h2 class="modal-title" id="modalTitle"></h2>
    <div class="modal-meta" id="modalMeta"></div>
    <div class="modal-desc" id="modalDesc"></div>

    <!-- กล่องเลือกวิธีชำระเงิน (ซ่อนไว้ โชว์ตอน Admin กดทำเสร็จ) -->
    <div id="paymentSection" class="hidden" style="margin-top: 16px; padding-top: 16px; border-top: 1.5px dashed var(--line); margin-bottom: 16px;">
      <p style="font-size: 14px; font-weight: 700; margin: 0 0 10px; color: var(--accent);">งานเสร็จแล้ว! เลือกวิธีชำระเงินได้เลย 👇</p>
      <div style="display: flex; gap: 8px; margin-bottom: 12px;">
         <button class="btn" style="flex: 1; background: #003D6B; color: white;" onclick="showPromptPay()">📲 โอนเงิน (QR)</button>
         <button class="btn btn-self" style="flex: 1;" onclick="showCash()">💵 จ่ายเงินสด</button>
      </div>
      <div id="payDetails" class="hidden" style="background: var(--bg); padding: 16px; border-radius: 10px; font-size: 14px; text-align: center; border: 1.5px solid var(--line);"></div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-claim" id="claimBtn" onclick="claimTask()">ให้ไทม์ทำงานนี้</button>
      <button class="btn btn-self" id="selfBtn" onclick="startSelfTask()">งานนี้ขอทำเอง</button>
      <button class="btn btn-done hidden" id="selfDoneBtn" onclick="finishSelfTask()">ทำเองเสร็จแล้ว (ส่งแล้ว)</button>
      <button class="btn btn-cancel" onclick="closeModal()">ปิด</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ---------------- Firebase init ----------------
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // ⚠️ ตั้งค่าบัญชีรับเงินของคุณตรงนี้
  const MY_PROMPTPAY = "0963413738"; // ใส่เบอร์โทรศัพท์ที่ผูกพร้อมเพย์
  const MY_NAME = "ณัฐพงศ์ เภกะนันทน์"; // ชื่อบัญชีธนาคาร 

  // ---------------- State ----------------
  let selectedNumber = null;
  let currentUser = null; 
  let allTasks = [];
  let allOrders = [];
  let activeTaskId = null;

  // ---------------- Login screen: build number grid ----------------
  const numberGrid = document.getElementById('numberGrid');
  for (let i = 1; i <= 30; i++) {
    const b = document.createElement('button');
    b.className = 'num-btn';
    b.textContent = i;
    b.onclick = () => selectNumber(i, b);
    numberGrid.appendChild(b);
  }

  function selectNumber(n, btnEl) {
    selectedNumber = n;
    document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('selected'));
    btnEl.classList.add('selected');
    document.getElementById('pwRow').classList.add('show');
    document.getElementById('pwLabel').textContent = `รหัสของเลขที่ ${n}`;
    document.getElementById('loginBtn').disabled = false;
    document.getElementById('loginError').classList.remove('show');
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }

  document.getElementById('loginBtn').onclick = doLogin;
  document.getElementById('pwInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const pw = document.getElementById('pwInput').value.trim();
    if (!selectedNumber || !pw) return;

    const loginBtn = document.getElementById('loginBtn');
    loginBtn.disabled = true;
    loginBtn.textContent = 'กำลังตรวจสอบ...';

    try {
      const docRef = db.collection('users').doc(String(selectedNumber));
      const docSnap = await docRef.get();

      if (!docSnap.exists || docSnap.data().password !== pw) {
        document.getElementById('loginError').classList.add('show');
        loginBtn.disabled = false;
        loginBtn.textContent = 'เข้าสู่ระบบ';
        return;
      }

      currentUser = { studentId: String(selectedNumber), name: docSnap.data().name || `เลขที่ ${selectedNumber}` };
      sessionStorage.setItem('cr_user', JSON.stringify(currentUser));
      enterDashboard();

    } catch (err) {
      console.error(err);
      document.getElementById('loginError').textContent = 'เชื่อมต่อไม่ได้ ลองใหม่อีกครั้ง';
      document.getElementById('loginError').classList.add('show');
      loginBtn.disabled = false;
      loginBtn.textContent = 'เข้าสู่ระบบ';
    }
  }

  function logout() {
    sessionStorage.removeItem('cr_user');
    currentUser = null;
    location.reload();
  }

  // ---------------- Dashboard ----------------
  function enterDashboard() {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('dashScreen').classList.remove('hidden');
    document.getElementById('whoLabel').textContent = `${currentUser.name} · ออกจากระบบ`;
    listenToTasks();
    listenToOrders();
  }

  (function restoreSession() {
    const saved = sessionStorage.getItem('cr_user');
    if (saved) {
      currentUser = JSON.parse(saved);
      enterDashboard();
    }
  })();

  // ---------------- Real-time listeners ----------------
  function listenToTasks() {
    db.collection('assignments').orderBy('created_at', 'desc')
      .onSnapshot(snap => {
        allTasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderTasks();
      }, err => console.error('tasks listener error', err));
  }

  function listenToOrders() {
    db.collection('orders').onSnapshot(snap => {
      allOrders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderTasks();
    }, err => console.error('orders listener error', err));
  }

  // ---------------- Render task list ----------------
  function renderTasks() {
    const list = document.getElementById('taskList');
    const compList = document.getElementById('completedList');
    const empty = document.getElementById('emptyState');

    list.innerHTML = '';
    compList.innerHTML = '';

    let hasPending = false;
    let hasCompleted = false;

    allTasks.forEach(t => {
      const order = allOrders.find(o => o.task_id === t.id && o.student_id === currentUser.studentId);
      const card = document.createElement('div');
      card.className = 'task-card';
      card.onclick = () => openTask(t.id);

      let badge = '';
      let isCompleted = false;

      if (order) {
        if (order.status === 'pending') {
          badge = ' · ⏳ ไทม์กำลังทำ';
        } else if (order.status === 'done') {
          badge = ' · 🔴 เสร็จแล้ว! กดเพื่อดูวิธีจ่ายเงิน';
          card.style.borderColor = '#E8836A'; 
          card.style.borderWidth = '1.5px';
        } else if (order.status === 'paid') {
          badge = ' · ✅ ไทม์ทำเสร็จแล้ว';
          isCompleted = true;
        } else if (order.status === 'self_working') {
          badge = ' · ✍️ กำลังทำเอง';
        } else if (order.status === 'self_done') {
          badge = ' · ✅ ทำเองเสร็จแล้ว';
          isCompleted = true;
        }
      }

      if (isCompleted) card.classList.add('opacity');

      card.innerHTML = `
        <div class="task-title">${escapeHtml(t.title)}</div>
        <div class="task-meta">${formatDate(t.due_date)}${badge}</div>
      `;

      if (isCompleted) {
        compList.appendChild(card);
        hasCompleted = true;
      } else {
        list.appendChild(card);
        hasPending = true;
      }
    });

    empty.classList.toggle('hidden', hasPending || hasCompleted);
    document.getElementById('pendingSection').classList.toggle('hidden', !hasPending);
    document.getElementById('completedSection').classList.toggle('hidden', !hasCompleted);
  }

  // ---------------- Payment Options UI ----------------
  function showPromptPay() {
    const pd = document.getElementById('payDetails');
    const ppNumber = MY_PROMPTPAY.replace(/[^0-9]/g, ''); 
    pd.innerHTML = `
      <img src="https://promptpay.io/${ppNumber}" style="width: 160px; height: 160px; margin-bottom: 12px; border-radius: 8px;">
      <div style="font-weight: 800; font-size: 16px; letter-spacing: 0.5px;">พร้อมเพย์: ${MY_PROMPTPAY}</div>
      <div style="color: var(--muted); font-size: 13.5px; margin-bottom: 10px;">ชื่อบัญชี: ${MY_NAME}</div>
      <div style="font-size: 12.5px; color: var(--accent); background: var(--accent-soft); padding: 8px; border-radius: 8px;">
        * โอนตามยอดที่ตกลงกันไว้ แล้วทักบอกไทม์ได้เลย!
      </div>
    `;
    pd.classList.remove('hidden');
  }

  function showCash() {
    const pd = document.getElementById('payDetails');
    pd.innerHTML = `
      <div style="font-size: 44px; margin-bottom: 8px;">💵</div>
      <div style="font-weight: 800; font-size: 16px;">จ่ายด้วยเงินสด</div>
      <div style="color: var(--muted); font-size: 14px; margin-top: 4px;">
        เตรียมเงินสดมาให้ไทม์ที่โรงเรียนได้เลยนะ!
      </div>
    `;
    pd.classList.remove('hidden');
  }

  // ---------------- Task detail modal ----------------
  function openTask(taskId) {
    activeTaskId = taskId;
    const t = allTasks.find(x => x.id === taskId);
    if (!t) return;
    
    const order = allOrders.find(o => o.task_id === taskId && o.student_id === currentUser.studentId);

    document.getElementById('modalTitle').textContent = t.title;
    document.getElementById('modalMeta').textContent = formatDate(t.due_date);
    document.getElementById('modalDesc').textContent = t.description || 'ไม่มีรายละเอียดเพิ่มเติม';

    const statusTag = document.getElementById('statusTag');
    const claimBtn = document.getElementById('claimBtn');
    const selfBtn = document.getElementById('selfBtn');
    const selfDoneBtn = document.getElementById('selfDoneBtn');
    const paymentSection = document.getElementById('paymentSection');
    const payDetails = document.getElementById('payDetails');

    // รีเซ็ตปุ่มและหน้าจอทั้งหมดก่อน
    statusTag.className = 'status-tag hidden';
    claimBtn.classList.add('hidden');
    selfBtn.classList.add('hidden');
    selfDoneBtn.classList.add('hidden');
    paymentSection.classList.add('hidden');
    payDetails.classList.add('hidden');
    claimBtn.disabled = false;
    selfBtn.disabled = false;

    if (!order) {
      claimBtn.classList.remove('hidden');
      selfBtn.classList.remove('hidden');
    } else if (order.status === 'pending') {
      statusTag.textContent = 'ไทม์กำลังทำงานนี้ให้คุณอยู่ ⏳';
      statusTag.className = 'status-tag claimed';
      statusTag.classList.remove('hidden');
    } else if (order.status === 'done') {
      statusTag.textContent = 'ไทม์ทำเสร็จแล้ว! รอชำระเงิน';
      statusTag.className = 'status-tag alert';
      statusTag.classList.remove('hidden');
      paymentSection.classList.remove('hidden');
    } else if (order.status === 'paid') {
      statusTag.textContent = 'คุณชำระเงินและรับงานนี้เรียบร้อย ✅';
      statusTag.className = 'status-tag mine';
      statusTag.classList.remove('hidden');
    } else if (order.status === 'self_working') {
      statusTag.textContent = 'คุณกำลังทำงานนี้เอง สู้ๆ ✌️';
      statusTag.className = 'status-tag mine';
      statusTag.classList.remove('hidden');
      selfDoneBtn.classList.remove('hidden');
    } else if (order.status === 'self_done') {
      statusTag.textContent = 'คุณทำเองเสร็จแล้ว (ส่งแล้ว) ✅';
      statusTag.className = 'status-tag mine';
      statusTag.classList.remove('hidden');
    }

    document.getElementById('modalBackdrop').classList.add('show');
  }

  function closeModal() {
    document.getElementById('modalBackdrop').classList.remove('show');
    activeTaskId = null;
  }

  async function claimTask() {
    if (!activeTaskId) return;
    const claimBtn = document.getElementById('claimBtn');
    claimBtn.disabled = true;
    claimBtn.textContent = 'กำลังบันทึก...';

    try {
      await db.collection('orders').add({
        task_id: activeTaskId,
        student_id: currentUser.studentId,
        student_name: currentUser.name,
        status: 'pending',
        price: null,
        created_at: firebase.firestore.FieldValue.serverTimestamp()
      });
      showToast('สั่งงานให้ไทม์ทำเรียบร้อย เดี๋ยวรีบทำให้นะ 🙌');
      closeModal();
    } catch (err) {
      console.error(err);
      showToast('บันทึกไม่สำเร็จ ลองใหม่อีกครั้ง');
      claimBtn.disabled = false;
      claimBtn.textContent = 'ให้ไทม์ทำงานนี้';
    }
  }

  async function startSelfTask() {
    if (!activeTaskId) return;
    const selfBtn = document.getElementById('selfBtn');
    selfBtn.disabled = true;

    try {
      await db.collection('orders').add({
        task_id: activeTaskId,
        student_id: currentUser.studentId,
        student_name: currentUser.name,
        status: 'self_working',
        price: 0,
        created_at: firebase.firestore.FieldValue.serverTimestamp()
      });
      showToast('ใช้เว็บนี้จดไว้ได้เลย สู้ๆ นะ! ✍️');
      closeModal();
    } catch (err) {
      console.error(err);
      showToast('บันทึกไม่สำเร็จ ลองใหม่อีกครั้ง');
      selfBtn.disabled = false;
    }
  }

  async function finishSelfTask() {
    if (!activeTaskId) return;
    const order = allOrders.find(o => o.task_id === activeTaskId && o.student_id === currentUser.studentId);
    if (!order) return;

    try {
      await db.collection('orders').doc(order.id).update({ status: 'self_done' });
      showToast('เก่งมาก! ทำเครื่องหมายว่าส่งงานแล้ว ✅');
      closeModal();
    } catch (err) {
      console.error(err);
      showToast('อัปเดตไม่สำเร็จ ลองใหม่อีกครั้ง');
    }
  }

  // ---------------- Helpers ----------------
  function formatDate(ts) {
    if (!ts) return 'ไม่ระบุวันส่ง';
    let d;
    if (ts.toDate) d = ts.toDate();
    else d = new Date(ts);
    if (isNaN(d.getTime())) return 'ไม่ระบุวันส่ง';
    return 'ส่ง ' + d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2400);
  }

  document.getElementById('modalBackdrop').addEventListener('click', e => {
    if (e.target.id === 'modalBackdrop') closeModal();
  });
</script>

</body>
</html>
